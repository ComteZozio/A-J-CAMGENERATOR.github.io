<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — Concepteur de came</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --accent: #D85A30;
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.1);
      --text: #f0efeb;
      --text2: #a0a09a;
      --text3: #606058;
      --accent: #E87060;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
  }

  .maintenance-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .logo-container {
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
  }

  .logo-container svg {
    /* Preserve natural aspect ratio 912:1173 ≈ 0.777 */
    width: 300px;
    height: auto;
    color: var(--text);
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 0.75rem;
  }

  p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%  { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.2); }
    100%{ opacity: 1; transform: scale(1); }
  }

  .footer-note {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text3);
    border-top: 0.5px solid var(--border);
    padding-top: 1.5rem;
  }
</style>
</head>
