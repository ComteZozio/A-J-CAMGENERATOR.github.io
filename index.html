<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — Concepteur de came</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --accent: #D85A30;
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.1);
      --text: #f0efeb;
      --text2: #a0a09a;
      --text3: #606058;
      --accent: #E87060;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
  }

  .maintenance-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    max-width: 450px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .icon-container {
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
  }

  .icon-container svg {
    width: 48px;
    height: 48px;
    color: var(--accent);
    stroke-width: 1.5;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 0.75rem;
  }

  p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }

  .footer-note {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text3);
    border-top: 0.5px solid var(--border);
    padding-top: 1.5rem;
  }

.icon-container svg {
  animation: tinker 1.5s ease-in-out infinite;
  transform-origin: center;
}

@keyframes tinker {
  0%, 100% { transform: rotate(0deg); }
  30% { transform: rotate(-10deg) translateY(-5px); }
  60% { transform: rotate(10deg) translateY(0); }
}
 
</style>
</head>
<body>

<div class="maintenance-card">
  <div class="icon-container">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
    </svg>
  </div>

  <h1>Maintenance en cours</h1>
  
  <p>
    Nous mettons à jour le <strong>Concepteur de came</strong> pour améliorer les calculs de trajectoire et l'export DXF. 
    L'outil sera de retour très prochainement.
  </p>

  <div class="status-badge">
    <div class="dot"></div>
    Mise à jour du système
  </div>

  <div class="footer-note">
    &copy; 2026 — Bureau d'études
  </div>
</div>

</body>
</html>
